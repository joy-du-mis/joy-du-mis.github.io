<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Vocab Reels</title>
    <style>
        :root {
            --bg: #000;
            --word-bg: #121212;
            --meaning-bg: #004d40;
            --accent: #00f2ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Disables browser default scroll */
        }

        #app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* This container holds all cards vertically */
        #main-track {
            width: 100%;
            height: 100%;
            position: absolute;
            will-change: transform;
        }

        .reel-unit {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Horizontal container for Word vs Meaning */
        .side-track {
            display: flex;
            width: 200%; /* Two pages wide */
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .page {
            width: 50%; /* One half of the side-track */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            user-select: none;
        }

        .word-page { background: var(--word-bg); }
        .meaning-page { background: var(--meaning-bg); }

        .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 10px; }
        .text { font-size: 3.5rem; font-weight: 900; }
        
        .footer-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.3;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="main-track"></div>
        <div class="footer-hint">Tap to Flip • Drag/Scroll vertically for Next</div>
    </div>

    <script>
        const vocab = [
            { en: "Infallible", bn: "নির্ভুল" },
            { en: "Euphoria", bn: "উচ্ছ্বাস" },
            { en: "Serendipity", bn: "আকস্মিক সৌভাগ্য" },
            { en: "Nuance", bn: "সামান্য পার্থক্য" },
            { en: "Vibrant", bn: "প্রাণবন্ত" }
        ];

        const track = document.getElementById('main-track');
        let currentIdx = 0;
        let startY = 0;
        let scrollY = 0;
        let isDragging = false;
        let winH = window.innerHeight;

        // 1. Build the Reels
        vocab.forEach((item, i) => {
            const unit = document.createElement('div');
            unit.className = 'reel-unit';
            unit.innerHTML = `
                <div class="side-track" id="side-${i}">
                    <div class="page word-page">
                        <div class="label">English</div>
                        <div class="text">${item.en}</div>
                    </div>
                    <div class="page meaning-page">
                        <div class="label">Bangla</div>
                        <div class="text" style="color:var(--accent)">${item.bn}</div>
                    </div>
                </div>
            `;
            // Tap logic per card
            unit.addEventListener('click', (e) => {
                const sideTrack = document.getElementById(`side-${i}`);
                const isFlipped = sideTrack.style.transform === 'translateX(-50%)';
                sideTrack.style.transform = isFlipped ? 'translateX(0%)' : 'translateX(-50%)';
            });
            track.appendChild(unit);
        });

        // 2. Interactive Dragging (Touch & Mouse)
        const startDrag = (y) => {
            isDragging = true;
            startY = y;
            track.style.transition = 'none';
        };

        const moveDrag = (y) => {
            if (!isDragging) return;
            const delta = y - startY;
            // The position is current index offset + the drag amount
            const moveAmount = (-currentIdx * winH) + delta;
            track.style.transform = `translateY(${moveAmount}px)`;
            scrollY = delta;
        };

        const endDrag = () => {
            if (!isDragging) return;
            isDragging = false;
            track.style.transition = 'transform 0.5s cubic-bezier(0.15, 1, 0.3, 1)';
            
            // Snap Logic
            if (scrollY < -100 && currentIdx < vocab.length - 1) {
                currentIdx++;
            } else if (scrollY > 100 && currentIdx > 0) {
                currentIdx--;
            }
            
            track.style.transform = `translateY(-${currentIdx * 100}vh)`;
            scrollY = 0;
        };

        // Touch Events
        window.addEventListener('touchstart', e => startDrag(e.touches[0].clientY));
        window.addEventListener('touchmove', e => moveDrag(e.touches[0].clientY));
        window.addEventListener('touchend', endDrag);

        // Mouse Events
        window.addEventListener('mousedown', e => startDrag(e.clientY));
        window.addEventListener('mousemove', e => moveDrag(e.clientY));
        window.addEventListener('mouseup', endDrag);

        // 3. Smooth Wheel Support (Simulating Drag)
        let wheelTimeout;
        window.addEventListener('wheel', e => {
            if (Math.abs(e.deltaY) < 10) return;
            
            // For mouse wheel, we auto-snap
            clearTimeout(wheelTimeout);
            wheelTimeout = setTimeout(() => {
                if (e.deltaY > 0 && currentIdx < vocab.length - 1) {
                    currentIdx++;
                } else if (e.deltaY < 0 && currentIdx > 0) {
                    currentIdx--;
                }
                track.style.transition = 'transform 0.6s cubic-bezier(0.2, 1, 0.3, 1)';
                track.style.transform = `translateY(-${currentIdx * 100}vh)`;
            }, 50);
        });

        window.addEventListener('resize', () => winH = window.innerHeight);

    </script>
</body>
</html>
