<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smooth Dual-Page Reels</title>
    <style>
        :root {
            --word-bg: #1a1a1a;
            --meaning-bg: #004d40; /* Deep teal for meaning */
            --accent: #00f2ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* The moving container */
        #card-container {
            width: 100%;
            height: 100%;
            display: flex; /* For side-by-side pages */
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            will-change: transform;
        }

        .page {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .word-page { background: var(--word-bg); }
        .meaning-page { background: var(--meaning-bg); }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            margin-bottom: 20px;
        }

        .text {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.2;
        }

        /* Instructions Footer */
        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.4;
            pointer-events: none;
            z-index: 10;
        }

        /* Animation class for vertical transitions */
        .slide-v {
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.3s !important;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="card-container">
            <div class="page word-page">
                <div class="label">English Word</div>
                <div id="en-text" class="text">Loading...</div>
            </div>
            <div class="page meaning-page">
                <div class="label">Bangla Meaning</div>
                <div id="bn-text" class="text" style="color: var(--accent);">...</div>
            </div>
        </div>
    </div>

    <div class="footer">Tap to toggle Meaning • Swipe Up for Next</div>

    <script>
        const vocab = [
            { en: "Profound", bn: "গভীর" },
            { en: "Inevitable", bn: "অনিবার্য" },
            { en: "Benevolent", bn: "দয়ালু" },
            { en: "Ambiguous", bn: "অস্পষ্ট" },
            { en: "Superficial", bn: "অগভীর" }
        ];

        let idx = 0;
        let isMeaningShown = false;
        let startY = 0;
        let isAnimating = false;

        const container = document.getElementById('card-container');
        const enText = document.getElementById('en-text');
        const bnText = document.getElementById('bn-text');

        function updateContent() {
            enText.textContent = vocab[idx].en;
            bnText.textContent = vocab[idx].bn;
        }

        // 1. TAP: Toggle horizontal slide between Word and Meaning
        window.addEventListener('click', (e) => {
            if (isAnimating) return;
            isMeaningShown = !isMeaningShown;
            container.style.transform = isMeaningShown ? 'translateX(-100%)' : 'translateX(0%)';
        });

        // 2. SWIPE: Vertical Logic
        window.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', e => {
            const diff = startY - e.changedTouches[0].clientY;
            
            // Check if vertical swipe is significant
            if (Math.abs(diff) > 60 && !isAnimating) {
                if (diff > 0 && idx < vocab.length - 1) {
                    animateNext(1); // Swipe Up
                } else if (diff < 0 && idx > 0) {
                    animateNext(-1); // Swipe Down
                }
            }
        });

        function animateNext(step) {
            isAnimating = true;
            
            // Slide current card out vertically
            container.classList.add('slide-v');
            const verticalMove = step > 0 ? -100 : 100;
            container.style.opacity = "0";
            container.style.transform += ` translateY(${verticalMove}%)`;

            setTimeout(() => {
                idx += step;
                updateContent();
                
                // Reset state to Word Page (Page 1)
                isMeaningShown = false;
                
                // Teleport container to opposite vertical side while invisible
                container.style.transition = 'none';
                container.style.transform = `translateX(0%) translateY(${-verticalMove}%)`;
                
                // Smoothly slide back into view
                requestAnimationFrame(() => {
                    container.style.transition = 'transform 0.5s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.4s';
                    container.style.transform = `translateX(0%) translateY(0%)`;
                    container.style.opacity = "1";
                    
                    setTimeout(() => {
                        container.classList.remove('slide-v');
                        isAnimating = false;
                    }, 500);
                });
            }, 400);
        }

        // Initialize
        updateContent();
    </script>
</body>
</html>
