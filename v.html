<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smooth Vocab Reels</title>
    <style>
        :root {
            --bg: #000;
            --card: #111;
            --accent: #00f2ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Critical: stops browser bounce */
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--card);
            padding: 40px;
            text-align: center;
            will-change: transform; /* Optimization for smooth GPU movement */
            border-top: 1px solid #222;
        }

        .english { font-size: 3.5rem; font-weight: 800; margin-bottom: 10px; }
        .bangla { font-size: 2.2rem; color: var(--accent); transition: opacity 0.3s; }
        .hidden { opacity: 0; pointer-events: none; }

        /* Progress Bar */
        #progress {
            position: absolute;
            top: 15px;
            width: 90%;
            left: 5%;
            display: flex;
            gap: 5px;
            z-index: 100;
        }
        .segment { height: 2px; flex: 1; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
        .fill { height: 100%; width: 0%; background: #fff; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="progress"></div>

    <div id="viewport">
        <div id="card" class="card">
            <h1 id="en" class="english">Swipe Up</h1>
            <h2 id="bn" class="bangla hidden">শুরু করুন</h2>
        </div>
    </div>

    <script>
        const vocab = [
            { en: "Resilient", bn: "স্থিতিস্থাপক" },
            { en: "Ephemeral", bn: "ক্ষণস্থায়ী" },
            { en: "Eloquent", bn: "বাকপটু" },
            { en: "Tenacious", bn: "নাছোড়বান্দা" },
            { en: "Pragmatic", bn: "বাস্তবধর্মী" }
        ];

        let idx = 0;
        let startY = 0;
        let currentY = 0;
        let isDragging = false;
        
        const card = document.getElementById('card');
        const enEl = document.getElementById('en');
        const bnEl = document.getElementById('bn');
        const prog = document.getElementById('progress');

        // Build progress segments
        vocab.forEach((_, i) => {
            prog.innerHTML += `<div class="segment"><div class="fill" id="p${i}"></div></div>`;
        });

        function updateUI() {
            enEl.textContent = vocab[idx].en;
            bnEl.textContent = vocab[idx].bn;
            bnEl.classList.add('hidden');
            vocab.forEach((_, i) => {
                document.getElementById(`p${i}`).style.width = i <= idx ? '100%' : '0%';
            });
        }

        // Logic for smooth dragging
        window.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
            isDragging = true;
            card.style.transition = 'none'; // Disable transition while finger is down
        });

        window.addEventListener('touchmove', e => {
            if (!isDragging) return;
            currentY = e.touches[0].clientY;
            const diff = currentY - startY;
            
            // Allow dragging, but add resistance at the ends of the list
            if ((idx === 0 && diff > 0) || (idx === vocab.length -1 && diff < 0)) {
                card.style.transform = `translateY(${diff * 0.2}px)`; 
            } else {
                card.style.transform = `translateY(${diff}px)`;
            }
        });

        window.addEventListener('touchend', e => {
            isDragging = false;
            const diff = currentY - startY;
            const threshold = window.innerHeight * 0.15; // 15% of screen height to trigger

            card.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1)'; // Springy snap

            if (diff < -threshold && idx < vocab.length - 1) {
                // Swipe UP (Next)
                idx++;
                animateSlide('up');
            } else if (diff > threshold && idx > 0) {
                // Swipe DOWN (Prev)
                idx--;
                animateSlide('down');
            } else {
                // Snap back to center
                card.style.transform = `translateY(0)`;
            }
            startY = 0;
            currentY = 0;
        });

        function animateSlide(dir) {
            // First, push card completely off screen
            card.style.transform = dir === 'up' ? `translateY(-100%)` : `translateY(100%)`;
            card.style.opacity = '0';

            setTimeout(() => {
                updateUI();
                // Teleport to opposite side instantly
                card.style.transition = 'none';
                card.style.transform = dir === 'up' ? `translateY(100%)` : `translateY(-100%)`;
                
                // Slide back into center
                requestAnimationFrame(() => {
                    card.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s';
                    card.style.transform = `translateY(0)`;
                    card.style.opacity = '1';
                });
            }, 100);
        }

        // Tap to Reveal
        window.addEventListener('click', (e) => {
            // Prevent reveal if the user was just swiping
            if (Math.abs(startY - currentY) < 5) {
                bnEl.classList.toggle('hidden');
            }
        });

        updateUI();
    </script>
</body>
</html>
