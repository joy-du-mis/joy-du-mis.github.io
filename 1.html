<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Reels</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#121212;
overflow:hidden;
color:white;
height:100vh;
}

#app{
height:100vh;
width:100vw;
position:relative;
overflow:hidden;
}

.card{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-weight:600;
transition:transform .45s cubic-bezier(.22,.61,.36,1);
}

.word{
font-size:clamp(40px,8vw,80px);
}

.meaning{
font-size:clamp(22px,5vw,40px);
opacity:.9;
}

.card-inner{
display:flex;
width:200%;
height:100%;
transition:transform .4s cubic-bezier(.22,.61,.36,1);
}

.side{
width:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.progress{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:70px;
height:70px;
border-radius:50%;
backdrop-filter:blur(10px);
background:rgba(255,255,255,.05);
display:flex;
align-items:center;
justify-content:center;
transition:.4s;
}

.progress.completed{
width:180px;
border-radius:20px;
background:cyan;
}

.progress span{
font-size:18px;
}

.progress svg{
position:absolute;
width:100%;
height:100%;
transform:rotate(-90deg);
}

.progress circle{
fill:none;
stroke:cyan;
stroke-width:5;
stroke-dasharray:200;
stroke-dashoffset:200;
transition:.3s;
}

.completed span{
opacity:0;
}

.completed::after{
content:"COMPLETED";
font-weight:700;
color:black;
}

canvas{
position:fixed;
pointer-events:none;
top:0;
left:0;
}

</style>
</head>

<body>

<div id="app"></div>

<div class="progress" id="progress">
<svg>
<circle cx="35" cy="35" r="30"></circle>
</svg>
<span id="counter">1</span>
</div>

<canvas id="confetti"></canvas>

<script>

const vocab=[
{en:"Admonish",bn:"ধমক দেওয়া"},
{en:"Aesthetic",bn:"নান্দনিক"},
{en:"Affectation",bn:"কৃত্রিম আচরণ"},
{en:"Benevolent",bn:"দয়ালু"},
{en:"Candid",bn:"সৎ"}
]

const app=document.getElementById("app")
const circle=document.querySelector("circle")
const counter=document.getElementById("counter")
const progress=document.getElementById("progress")

let index=0
let startX=0
let startY=0
let dragging=false
let direction=null

function createCards(){

vocab.forEach((v,i)=>{

let card=document.createElement("div")
card.className="card"
card.style.zIndex=vocab.length-i

let inner=document.createElement("div")
inner.className="card-inner"

let front=document.createElement("div")
front.className="side"
front.innerHTML=`<div class="word">${v.en}</div>`

let back=document.createElement("div")
back.className="side"
back.innerHTML=`<div class="meaning">${v.bn}</div>`

inner.appendChild(front)
inner.appendChild(back)
card.appendChild(inner)

if(i>0) card.style.transform="translateY(100%)"

app.appendChild(card)

})

}

createCards()

const cards=[...document.querySelectorAll(".card")]

function updateProgress(){

counter.textContent=index+1

let percent=(index+1)/vocab.length
circle.style.strokeDashoffset=200-(200*percent)

if(index===vocab.length-1){
progress.classList.add("completed")
launchConfetti()
}

}

updateProgress()

function resetHorizontal(){

cards.forEach(card=>{
card.querySelector(".card-inner").style.transform="translateX(0%)"
})

}

function next(){

if(index>=vocab.length-1)return

cards[index].style.transform="translateY(-100%)"

index++

resetHorizontal()

cards[index].style.transform="translateY(0%)"

updateProgress()

}

function prev(){

if(index<=0)return

cards[index].style.transform="translateY(100%)"

index--

resetHorizontal()

cards[index].style.transform="translateY(0%)"

}

app.addEventListener("touchstart",e=>{

dragging=true
startX=e.touches[0].clientX
startY=e.touches[0].clientY
direction=null

})

app.addEventListener("touchmove",e=>{

if(!dragging)return

let dx=e.touches[0].clientX-startX
let dy=e.touches[0].clientY-startY

if(!direction){
direction=Math.abs(dx)>Math.abs(dy)?"h":"v"
}

if(direction==="h"){

cards[index].querySelector(".card-inner")
.style.transform=`translateX(${dx}px)`

}

if(direction==="v"){

cards[index].style.transition="none"
cards[index].style.transform=`translateY(${dy}px)`

}

})

app.addEventListener("touchend",e=>{

dragging=false

let dx=e.changedTouches[0].clientX-startX
let dy=e.changedTouches[0].clientY-startY

cards[index].style.transition=".4s cubic-bezier(.22,.61,.36,1)"

if(direction==="h"){

if(dx<-80){
cards[index].querySelector(".card-inner")
.style.transform="translateX(-50%)"
}else{
cards[index].querySelector(".card-inner")
.style.transform="translateX(0%)"
}

}

if(direction==="v"){

if(dy<-80) next()
else if(dy>80) prev()
else cards[index].style.transform="translateY(0)"

}

})

app.addEventListener("wheel",e=>{

if(e.deltaY>0) next()
else prev()

})

/* confetti */

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let confetti=[]

function launchConfetti(){

for(let i=0;i<150;i++){

confetti.push({

x:Math.random()*canvas.width,
y:-20,
size:5+Math.random()*5,
speed:2+Math.random()*3,
angle:Math.random()*Math.PI*2

})

}

animate()

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

confetti.forEach(p=>{

p.y+=p.speed
p.x+=Math.sin(p.angle)

ctx.fillStyle=`hsl(${Math.random()*360},80%,60%)`
ctx.fillRect(p.x,p.y,p.size,p.size)

})

requestAnimationFrame(animate)

}

</script>

</body>
</html>
