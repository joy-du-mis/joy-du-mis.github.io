<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Reel Stacks</title>
    <style>
        :root {
            --word-bg: #121212;
            --meaning-bg: #1a237e;
            --accent: #00f2ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            color: white;
            font-family: -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .card-stack {
            position: absolute;
            width: 100%;
            height: 100%;
            will-change: transform;
            display: flex;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .page {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            user-select: none;
        }

        .word-page { background: var(--word-bg); }
        .meaning-page { background: var(--meaning-bg); }

        .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 15px; }
        .text { font-size: 3.5rem; font-weight: 900; }

        .hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.3;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="viewport"></div>
    <div class="hint">Tap to Flip • Drag vertically to browse</div>

    <script>
        const vocab = [
            { en: "Infallible", bn: "নির্ভুল" },
            { en: "Euphoria", bn: "উচ্ছ্বাস" },
            { en: "Serendipity", bn: "আকস্মিক সৌভাগ্য" },
            { en: "Nuance", bn: "সামান্য পার্থক্য" },
            { en: "Vibrant", bn: "প্রাণবন্ত" }
        ];

        const viewport = document.getElementById('viewport');
        const cards = [];
        let currentIdx = 0;
        let startY = 0;
        let isDragging = false;
        let deltaY = 0;

        // 1. Initialize Stack
        vocab.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'card-stack';
            el.style.zIndex = vocab.length - i; // Higher index for earlier cards
            el.innerHTML = `
                <div class="page word-page">
                    <div class="label">English</div>
                    <div class="text">${item.en}</div>
                </div>
                <div class="page meaning-page">
                    <div class="label">Bangla</div>
                    <div class="text" style="color:var(--accent)">${item.bn}</div>
                </div>
            `;

            // Tap to flip
            el.addEventListener('click', () => {
                const isFlipped = el.dataset.flipped === 'true';
                el.style.transform = isFlipped ? 'translateX(0%)' : 'translateX(-100%)';
                el.dataset.flipped = !isFlipped;
            });

            viewport.appendChild(el);
            cards.push(el);
        });

        // 2. Dragging Logic
        function handleStart(y) {
            isDragging = true;
            startY = y;
            cards.forEach(c => c.style.transition = 'none');
        }

        function handleMove(y) {
            if (!isDragging) return;
            deltaY = y - startY;

            // Swipe Up (Moving Current Card Away)
            if (deltaY < 0 && currentIdx < cards.length - 1) {
                cards[currentIdx].style.transform = `translateY(${deltaY}px)`;
            } 
            // Swipe Down (Pulling Previous Card back in)
            else if (deltaY > 0 && currentIdx > 0) {
                const prevCard = cards[currentIdx - 1];
                prevCard.style.transform = `translateY(${Math.min(-window.innerHeight + deltaY, 0)}px)`;
            }
        }

        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            const threshold = window.innerHeight * 0.2;

            cards.forEach(c => c.style.transition = 'transform 0.5s cubic-bezier(0.2, 1, 0.3, 1)');

            if (deltaY < -threshold && currentIdx < cards.length - 1) {
                // Confirm Next
                cards[currentIdx].style.transform = `translateY(-100%)`;
                currentIdx++;
            } else if (deltaY > threshold && currentIdx > 0) {
                // Confirm Previous
                currentIdx--;
                cards[currentIdx].style.transform = `translateY(0%)`;
            } else {
                // Snap Back
                cards[currentIdx].style.transform = cards[currentIdx].dataset.flipped === 'true' ? 'translateX(-100%)' : 'translateX(0%)';
                if (currentIdx > 0) cards[currentIdx - 1].style.transform = `translateY(-100%)`;
            }
            deltaY = 0;
        }

        // Event Listeners (Mouse + Touch)
        window.addEventListener('mousedown', e => handleStart(e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientY));
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('touchstart', e => handleStart(e.touches[0].clientY));
        window.addEventListener('touchmove', e => handleMove(e.touches[0].clientY));
        window.addEventListener('touchend', handleEnd);

        // Wheel Support
        window.addEventListener('wheel', e => {
            if (isDragging) return;
            if (e.deltaY > 50 && currentIdx < cards.length - 1) {
                cards[currentIdx].style.transform = `translateY(-100%)`;
                currentIdx++;
            } else if (e.deltaY < -50 && currentIdx > 0) {
                currentIdx--;
                cards[currentIdx].style.transform = `translateY(0%)`;
            }
        });

    </script>
</body>
</html>
