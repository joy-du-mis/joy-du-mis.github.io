<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Vocabulary Reels V2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

html,body{
height:100%;
width:100%;
background:#121212;
color:white;
overflow:hidden;
touch-action:none;
}

#app{
height:100vh;
width:100vw;
position:relative;
overflow:hidden;
}

/* CARD */

.card{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
transition:transform .45s cubic-bezier(.22,.61,.36,1);
will-change:transform;
}

.card-inner{
width:200%;
display:flex;
height:100%;
transition:transform .35s cubic-bezier(.22,.61,.36,1);
}

.side{
width:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
}

.word{
font-size:clamp(42px,9vw,78px);
font-weight:700;
}

.meaning{
font-size:clamp(26px,6vw,42px);
opacity:.9;
}

/* PROGRESS */

.progress{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:70px;
height:70px;
border-radius:50%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
justify-content:center;
transition:.4s;
}

.progress.completed{
width:200px;
border-radius:20px;
background:#00ffff;
}

.progress span{
font-weight:700;
font-size:20px;
}

.progress.completed span{
opacity:0;
}

.progress.completed::after{
content:"COMPLETED";
font-weight:800;
color:black;
}

.progress svg{
position:absolute;
width:100%;
height:100%;
transform:rotate(-90deg);
}

.progress circle{
fill:none;
stroke:#00ffff;
stroke-width:5;
stroke-dasharray:200;
stroke-dashoffset:200;
transition:.3s;
}

/* CONFETTI */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>

</head>

<body>

<div id="app"></div>

<div class="progress" id="progress">
<svg>
<circle cx="35" cy="35" r="30"></circle>
</svg>
<span id="counter">1</span>
</div>

<canvas id="confetti"></canvas>

<script>

/* VOCAB DATA */

const words=[
{en:"Admonish",bn:"ধমক দেওয়া"},
{en:"Aesthetic",bn:"নান্দনিক"},
{en:"Affectation",bn:"কৃত্রিম আচরণ"},
{en:"Benevolent",bn:"দয়ালু"},
{en:"Candid",bn:"সৎ"},
{en:"Diligent",bn:"পরিশ্রমী"}
]

const app=document.getElementById("app")
const progress=document.getElementById("progress")
const counter=document.getElementById("counter")
const circle=document.querySelector("circle")

let index=0
let startX,startY
let axis=null
let dragging=false

function createCards(){

words.forEach((w,i)=>{

const card=document.createElement("div")
card.className="card"
card.style.zIndex=words.length-i

const inner=document.createElement("div")
inner.className="card-inner"

inner.innerHTML=`
<div class="side">
<div class="word">${w.en}</div>
</div>

<div class="side">
<div class="meaning">${w.bn}</div>
</div>
`

card.appendChild(inner)

if(i>0) card.style.transform="translateY(100%)"

app.appendChild(card)

})

}

createCards()

function cards(){
return [...document.querySelectorAll(".card")]
}

/* PROGRESS */

function updateProgress(){

counter.textContent=index+1

let percent=(index+1)/words.length

circle.style.strokeDashoffset=200-(200*percent)

if(index===words.length-1){

progress.classList.add("completed")
launchConfetti()

}

}

updateProgress()

/* RESET */

function resetHorizontal(){

cards().forEach(c=>{
c.querySelector(".card-inner").style.transform="translateX(0)"
})

}

/* NAVIGATION */

function next(){

if(index>=words.length-1)return

cards()[index].style.transform="translateY(-100%)"

index++

resetHorizontal()

cards()[index].style.transform="translateY(0)"

updateProgress()

}

function prev(){

if(index<=0)return

cards()[index].style.transform="translateY(100%)"

index--

resetHorizontal()

cards()[index].style.transform="translateY(0)"

}

/* TOUCH */

app.addEventListener("touchstart",e=>{

dragging=true
startX=e.touches[0].clientX
startY=e.touches[0].clientY
axis=null

},{passive:false})

app.addEventListener("touchmove",e=>{

if(!dragging)return

let dx=e.touches[0].clientX-startX
let dy=e.touches[0].clientY-startY

if(!axis){
axis=Math.abs(dx)>Math.abs(dy)?"h":"v"
}

if(axis==="h"){

cards()[index]
.querySelector(".card-inner")
.style.transform=`translateX(${dx}px)`

}

if(axis==="v"){

cards()[index].style.transition="none"
cards()[index].style.transform=`translateY(${dy}px)`

}

},{passive:false})

app.addEventListener("touchend",e=>{

dragging=false

let dx=e.changedTouches[0].clientX-startX
let dy=e.changedTouches[0].clientY-startY

cards()[index].style.transition=".4s cubic-bezier(.22,.61,.36,1)"

if(axis==="h"){

if(dx<-80)
cards()[index].querySelector(".card-inner").style.transform="translateX(-50%)"
else
cards()[index].querySelector(".card-inner").style.transform="translateX(0)"

}

if(axis==="v"){

if(dy<-80) next()
else if(dy>80) prev()
else cards()[index].style.transform="translateY(0)"

}

})

/* TAP REVEAL */

app.addEventListener("click",()=>{

let inner=cards()[index].querySelector(".card-inner")

if(inner.style.transform==="translateX(-50%)")
inner.style.transform="translateX(0)"
else
inner.style.transform="translateX(-50%)"

})

/* DESKTOP SCROLL */

app.addEventListener("wheel",e=>{

if(e.deltaY>0) next()
else prev()

})

/* CONFETTI */

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let confetti=[]

function launchConfetti(){

for(let i=0;i<160;i++){

confetti.push({

x:Math.random()*canvas.width,
y:-20,
size:6+Math.random()*6,
speed:2+Math.random()*4,
angle:Math.random()*Math.PI

})

}

animate()

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

confetti.forEach(p=>{

p.y+=p.speed
p.x+=Math.sin(p.angle)

ctx.fillStyle=`hsl(${Math.random()*360},80%,60%)`
ctx.fillRect(p.x,p.y,p.size,p.size)

})

requestAnimationFrame(animate)

}

</script>

</body>
</html>
