<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Reels with Confetti</title>
    <style>
        :root {
            --word-bg: #121212;
            --meaning-bg: #1a237e;
            --accent: #00f2ea;
            --panel-bg: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Fixed Header Area to anchor the Progress Panel */
        #header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            pointer-events: none;
        }

        #progress-panel {
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 60px; height: 60px; border-radius: 50%;
            position: relative;
        }

        #progress-panel.completed {
            width: 150px; height: 45px; border-radius: 12px;
            background: var(--accent); color: #000;
        }

        #counter-text { position: absolute; font-size: 1.3rem; font-weight: 800; transition: opacity 0.3s; }
        #completion-msg { position: absolute; font-size: 0.85rem; font-weight: 900; text-transform: uppercase; opacity: 0; white-space: nowrap; transform: scale(0.8); transition: all 0.4s; }
        #progress-panel.completed #counter-text { opacity: 0; pointer-events: none; }
        #progress-panel.completed #completion-msg { opacity: 1; transform: scale(1); }

        .progress-ring { position: absolute; transition: opacity 0.3s; }
        .progress-ring__circle { transition: stroke-dashoffset 0.4s ease; transform: rotate(-90deg); transform-origin: 50% 50%; stroke: var(--accent); }
        #progress-panel.completed .progress-ring { opacity: 0; }

        /* Card Setup */
        #viewport { width: 100%; height: 100%; position: relative; }
        .card-stack { position: absolute; width: 100%; height: 100%; will-change: transform; display: flex; transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .page { min-width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        .word-page { background: var(--word-bg); }
        .meaning-page { background: var(--meaning-bg); }
        .text { font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 900; letter-spacing: -1px; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 12px; }

        .hint { position: absolute; bottom: 25px; width: 100%; text-align: center; font-size: 0.7rem; opacity: 0.25; z-index: 1000; }

        /* Confetti Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1002; /* On top of everything */
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="progress-panel">
            <svg class="progress-ring" width="60" height="60">
                <circle stroke="rgba(255,255,255,0.08)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
                <circle id="progress-circle" class="progress-ring__circle" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
            </svg>
            <div id="counter-text">1</div>
            <div id="completion-msg">Completed</div>
        </div>
    </div>

    <div id="viewport"></div>
    <div class="hint">Swipe L/R for Meaning • Swipe U/D for Words</div>
    <canvas id="confetti-canvas"></canvas>

    <script>
        const vocab = [
            { en: "Infallible", bn: "নির্ভুল" },
            { en: "Euphoria", bn: "উচ্ছ্বাস" },
            { en: "Serendipity", bn: "আকস্মিক সৌভাগ্য" },
            { en: "Nuance", bn: "সামান্য পার্থক্য" },
            { en: "Vibrant", bn: "প্রাণবন্ত" }
        ];

        const viewport = document.getElementById('viewport');
        const circle = document.getElementById('progress-circle');
        const panel = document.getElementById('progress-panel');
        const counter = document.getElementById('counter-text');
        
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        let currentIdx = 0;
        let startX = 0, startY = 0, deltaX = 0, deltaY = 0, isDragging = false, dragAxis = null;
        const cards = [];

        function updateProgressUI() {
            const currentNumber = currentIdx + 1;
            counter.textContent = currentNumber;
            const percent = (currentNumber / vocab.length) * 100;
            circle.style.strokeDashoffset = circumference - (percent / 100 * circumference);
            
            if (currentNumber === vocab.length) {
                panel.classList.add('completed');
                triggerConfetti();
            } else {
                panel.classList.remove('completed');
            }
        }

        function forceEnglish(index) {
            if (index < 0 || index >= cards.length) return;
            cards[index].dataset.hPos = 0;
        }

        // Initialize Cards
        vocab.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'card-stack';
            el.style.zIndex = vocab.length - i;
            el.dataset.hPos = 0;
            el.innerHTML = `
                <div class="page word-page"><div class="label">English Word</div><div class="text">${item.en}</div></div>
                <div class="page meaning-page"><div class="label" style="color:var(--accent)">Bangla Meaning</div><div class="text" style="color:var(--accent)">${item.bn}</div></div>
            `;
            viewport.appendChild(el);
            cards.push(el);
        });

        // Event Handling and Drag Logic (Remains unchanged for stabilization and bug fix)
        // ... (mousedown, mousemove, mouseup, touchstart, touchmove, touchend listeners) ...

        // Confetti Engine
        const confettiCanvas = document.getElementById('confetti-canvas');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettis = [];
        const confettiCount = 300;
        const gravity = 0.5;
        const terminalVelocity = 5;
        const drag = 0.075;
        const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4caf50', '#8bc34a', '#cddc39', '#ffeb3b', '#ffc107', '#ff9800', '#ff5722', '#795548', '#9e9e9e', '#607d8b'];

        function triggerConfetti() {
            initConfetti();
            requestAnimationFrame(animateConfetti);
        }

        class Confetti {
            constructor() {
                this.x = Math.random() * confettiCanvas.width;
                this.y = Math.random() * confettiCanvas.height - confettiCanvas.height;
                this.r = Math.random() * 6 + 4;
                this.d = Math.random() * confettiCount;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.tilt = Math.random() * 10 - 10;
                this.tiltAngleIncremental = Math.random() * 0.07 + 0.05;
                this.tiltAngle = 0;
            }
        }

        function initConfetti() {
            confettis = [];
            for (let i = 0; i < confettiCount; i++) {
                confettis.push(new Confetti());
            }
        }

        function animateConfetti() {
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            confettis.forEach((confetti, index) => {
                confetti.tiltAngle += confetti.tiltAngleIncremental;
                confetti.y += (Math.cos(confetti.d) + 3 + confetti.r / 2) / 2;
                confetti.tilt = Math.sin(confetti.tiltAngle - index / 3) * 15;

                if (confetti.y > confettiCanvas.height) {
                    confettis.splice(index, 1);
                }

                confettiCtx.beginPath();
                confettiCtx.lineWidth = confetti.r / 2;
                confettiCtx.strokeStyle = confetti.color;
                confettiCtx.moveTo(confetti.x + confetti.tilt + confetti.r / 4, confetti.y);
                confettiCtx.lineTo(confetti.x + confetti.tilt, confetti.y + confetti.tilt + confetti.r / 4);
                confettiCtx.stroke();
            });

            if (confettis.length > 0) {
                requestAnimationFrame(animateConfetti);
            } else {
                confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
        }

        function resizeConfettiCanvas() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeConfettiCanvas);
        resizeConfettiCanvas();
        updateProgressUI();
    </script>
</body>
</html>
