<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Reels - Stabilized</title>
    <style>
        :root {
            --word-bg: #121212;
            --meaning-bg: #1a237e;
            --accent: #00f2ea;
            --panel-bg: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Fixed Header Area to anchor the Progress Panel */
        #header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            pointer-events: none;
        }

        #progress-panel {
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Starting Circle State */
            width: 60px; 
            height: 60px; 
            border-radius: 50%;
            position: relative;
        }

        /* Completion Rectangle State */
        #progress-panel.completed {
            width: 150px; 
            height: 45px; 
            border-radius: 12px;
            background: var(--accent); 
            color: #000;
        }

        #counter-text { 
            position: absolute; 
            font-size: 1.3rem; 
            font-weight: 800; 
            transition: opacity 0.3s; 
        }

        #completion-msg { 
            position: absolute; 
            font-size: 0.85rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            opacity: 0; 
            white-space: nowrap; 
            transform: scale(0.8);
            transition: all 0.4s;
        }

        #progress-panel.completed #counter-text { opacity: 0; pointer-events: none; }
        #progress-panel.completed #completion-msg { opacity: 1; transform: scale(1); }

        .progress-ring { 
            position: absolute; 
            transition: opacity 0.3s; 
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.4s ease;
            transform: rotate(-90deg); 
            transform-origin: 50% 50%;
            stroke: var(--accent);
        }

        #progress-panel.completed .progress-ring { opacity: 0; }

        /* Card Setup */
        #viewport { width: 100%; height: 100%; position: relative; }

        .card-stack {
            position: absolute;
            width: 100%; height: 100%;
            will-change: transform;
            display: flex;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .page {
            min-width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 40px;
        }

        .word-page { background: var(--word-bg); }
        .meaning-page { background: var(--meaning-bg); }
        .text { font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 900; letter-spacing: -1px; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 12px; }

        .hint {
            position: absolute; bottom: 25px; width: 100%;
            text-align: center; font-size: 0.7rem; opacity: 0.25; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="progress-panel">
            <svg class="progress-ring" width="60" height="60">
                <circle stroke="rgba(255,255,255,0.08)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
                <circle id="progress-circle" class="progress-ring__circle" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
            </svg>
            <div id="counter-text">1</div>
            <div id="completion-msg">Completed</div>
        </div>
    </div>

    <div id="viewport"></div>
    <div class="hint">Swipe L/R for Meaning • Swipe U/D for Words</div>

    <script>
        const vocab = [
            { en: "Infallible", bn: "নির্ভুল" },
            { en: "Euphoria", bn: "উচ্ছ্বাস" },
            { en: "Serendipity", bn: "আকস্মিক সৌভাগ্য" },
            { en: "Nuance", bn: "সামান্য পার্থক্য" },
            { en: "Vibrant", bn: "প্রাণবন্ত" }
        ];

        const viewport = document.getElementById('viewport');
        const circle = document.getElementById('progress-circle');
        const panel = document.getElementById('progress-panel');
        const counter = document.getElementById('counter-text');
        
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        let currentIdx = 0;
        let startX = 0, startY = 0, deltaX = 0, deltaY = 0, isDragging = false, dragAxis = null;
        const cards = [];

        function updateProgressUI() {
            const currentNumber = currentIdx + 1;
            counter.textContent = currentNumber;
            const percent = (currentNumber / vocab.length) * 100;
            circle.style.strokeDashoffset = circumference - (percent / 100 * circumference);
            
            if (currentNumber === vocab.length) panel.classList.add('completed');
            else panel.classList.remove('completed');
        }

        function forceEnglish(index) {
            if (index < 0 || index >= cards.length) return;
            cards[index].dataset.hPos = 0;
        }

        // Initialize Cards
        vocab.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'card-stack';
            el.style.zIndex = vocab.length - i;
            el.dataset.hPos = 0;
            el.innerHTML = `
                <div class="page word-page"><div class="label">English</div><div class="text">${item.en}</div></div>
                <div class="page meaning-page"><div class="label" style="color:var(--accent)">Bangla</div><div class="text" style="color:var(--accent)">${item.bn}</div></div>
            `;
            viewport.appendChild(el);
            cards.push(el);
        });

        function handleStart(x, y) {
            isDragging = true; startX = x; startY = y; dragAxis = null;
            cards.forEach(c => c.style.transition = 'none');
        }

        function handleMove(x, y) {
            if (!isDragging) return;
            deltaX = x - startX; deltaY = y - startY;

            if (!dragAxis) {
                if (Math.abs(deltaX) > Math.abs(deltaY)) dragAxis = 'h';
                else if (Math.abs(deltaY) > 5) dragAxis = 'v';
            }

            if (dragAxis === 'h') {
                const currentH = parseInt(cards[currentIdx].dataset.hPos);
                let moveX = currentH + (deltaX / window.innerWidth * 100);
                moveX = Math.min(0, Math.max(-100, moveX));
                cards[currentIdx].style.transform = `translateX(${moveX}%)`;
            } else if (dragAxis === 'v') {
                if (deltaY < 0) forceEnglish(currentIdx);
                if (deltaY > 0) forceEnglish(currentIdx - 1);

                if (deltaY < 0 && currentIdx < cards.length - 1) {
                    cards[currentIdx].style.transform = `translateX(0%) translateY(${deltaY}px)`;
                } else if (deltaY > 0 && currentIdx > 0) {
                    const prev = cards[currentIdx-1];
                    prev.style.transform = `translateX(0%) translateY(${-window.innerHeight + deltaY}px)`;
                }
            }
        }

        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            const card = cards[currentIdx];
            cards.forEach(c => c.style.transition = 'all 0.5s cubic-bezier(0.2, 1, 0.3, 1)');

            if (dragAxis === 'h') {
                if (deltaX < -50) { card.style.transform = 'translateX(-100%)'; card.dataset.hPos = -100; }
                else if (deltaX > 50) { card.style.transform = 'translateX(0%)'; card.dataset.hPos = 0; }
                else card.style.transform = `translateX(${card.dataset.hPos}%)`;
            } else if (dragAxis === 'v') {
                if (deltaY < -100 && currentIdx < cards.length - 1) {
                    card.style.transform = `translateX(0%) translateY(-100%)`;
                    currentIdx++;
                } else if (deltaY > 100 && currentIdx > 0) {
                    currentIdx--;
                    cards[currentIdx].style.transform = `translateX(0%) translateY(0%)`;
                } else {
                    card.style.transform = `translateX(${card.dataset.hPos}%) translateY(0%)`;
                    if (currentIdx > 0) cards[currentIdx-1].style.transform = `translateX(0%) translateY(-100%)`;
                }
                updateProgressUI();
            }
            deltaX = 0; deltaY = 0;
        }

        // Event Listeners
        window.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', e => handleStart(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => handleMove(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', handleEnd);

        updateProgressUI();
    </script>
</body>
</html>
