<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reel Vocab - Interactive Stack</title>
    <style>
        :root {
            --word-bg: #121212;
            --meaning-bg: #1a237e;
            --accent: #00f2ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Circular Progress Container */
        #progress-wrapper {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            padding: 4px;
            backdrop-filter: blur(8px);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            stroke: var(--accent);
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* The Card Unit */
        .card-stack {
            position: absolute;
            width: 100%;
            height: 100%;
            will-change: transform;
            display: flex; /* Side-by-side pages */
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .page {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            user-select: none;
        }

        .word-page { background: var(--word-bg); }
        .meaning-page { background: var(--meaning-bg); }

        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 10px; }
        .text { font-size: 3.2rem; font-weight: 900; line-height: 1.1; }

        .hint {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.3;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="progress-wrapper">
        <svg width="44" height="44">
            <circle stroke="rgba(255,255,255,0.1)" stroke-width="3" fill="transparent" r="18" cx="22" cy="22"/>
            <circle id="progress-circle" class="progress-ring__circle" stroke-width="3" fill="transparent" r="18" cx="22" cy="22"/>
        </svg>
    </div>

    <div id="viewport"></div>
    <div class="hint">Swipe Left/Right for Bangla • Swipe Up/Down for Next</div>

    <script>
        const vocab = [
            { en: "Infallible", bn: "নির্ভুল" },
            { en: "Euphoria", bn: "উচ্ছ্বাস" },
            { en: "Serendipity", bn: "আকস্মিক সৌভাগ্য" },
            { en: "Nuance", bn: "সামান্য পার্থক্য" },
            { en: "Vibrant", bn: "প্রাণবন্ত" },
            { en: "Tenacious", bn: "নাছোড়বান্দা" }
        ];

        const viewport = document.getElementById('viewport');
        const circle = document.getElementById('progress-circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;

        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        const cards = [];
        let currentIdx = 0;
        let startX = 0, startY = 0;
        let deltaX = 0, deltaY = 0;
        let isDragging = false;
        let dragAxis = null; // 'v' for vertical, 'h' for horizontal

        function setProgress() {
            const percent = ((currentIdx + 1) / vocab.length) * 100;
            circle.style.strokeDashoffset = circumference - (percent / 100 * circumference);
        }

        // 1. Setup Cards
        vocab.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'card-stack';
            el.style.zIndex = vocab.length - i;
            el.dataset.horizontalPos = 0; // 0 is English, -100 is Bangla
            el.innerHTML = `
                <div class="page word-page">
                    <div class="label">English Word</div>
                    <div class="text">${item.en}</div>
                </div>
                <div class="page meaning-page">
                    <div class="label" style="color:var(--accent)">Bangla Meaning</div>
                    <div class="text" style="color:var(--accent)">${item.bn}</div>
                </div>
            `;
            viewport.appendChild(el);
            cards.push(el);
        });

        // 2. Interaction Logic
        function handleStart(x, y) {
            isDragging = true;
            startX = x;
            startY = y;
            dragAxis = null;
            cards.forEach(c => c.style.transition = 'none');
        }

        function handleMove(x, y) {
            if (!isDragging) return;
            deltaX = x - startX;
            deltaY = y - startY;

            // Determine Axis if not set
            if (!dragAxis) {
                if (Math.abs(deltaX) > Math.abs(deltaY)) dragAxis = 'h';
                else if (Math.abs(deltaY) > 5) dragAxis = 'v';
            }

            if (dragAxis === 'h') {
                // Horizontal Swipe (Left/Right)
                const currentHPos = parseInt(cards[currentIdx].dataset.horizontalPos);
                let moveX = currentHPos + (deltaX / window.innerWidth * 100);
                // Constraints
                moveX = Math.min(0, Math.max(-100, moveX));
                cards[currentIdx].style.transform = `translateX(${moveX}%)`;
            } 
            else if (dragAxis === 'v') {
                // Vertical Swipe (Up/Down)
                const hOffset = cards[currentIdx].dataset.horizontalPos;
                if (deltaY < 0 && currentIdx < cards.length - 1) {
                    cards[currentIdx].style.transform = `translateX(${hOffset}%) translateY(${deltaY}px)`;
                } else if (deltaY > 0 && currentIdx > 0) {
                    const prevCard = cards[currentIdx - 1];
                    const prevH = prevCard.dataset.horizontalPos;
                    prevCard.style.transform = `translateX(${prevH}%) translateY(${-window.innerHeight + deltaY}px)`;
                }
            }
        }

        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            const card = cards[currentIdx];
            const vThreshold = window.innerHeight * 0.15;
            const hThreshold = 50;

            cards.forEach(c => c.style.transition = 'transform 0.5s cubic-bezier(0.2, 1, 0.3, 1)');

            if (dragAxis === 'h') {
                // Horizontal Snapping
                if (deltaX < -hThreshold) {
                    card.style.transform = 'translateX(-100%)';
                    card.dataset.horizontalPos = -100;
                } else if (deltaX > hThreshold) {
                    card.style.transform = 'translateX(0%)';
                    card.dataset.horizontalPos = 0;
                } else {
                    card.style.transform = `translateX(${card.dataset.horizontalPos}%)`;
                }
            } 
            else if (dragAxis === 'v') {
                // Vertical Snapping
                if (deltaY < -vThreshold && currentIdx < cards.length - 1) {
                    card.style.transform = `translateX(${card.dataset.horizontalPos}%) translateY(-100%)`;
                    currentIdx++;
                } else if (deltaY > vThreshold && currentIdx > 0) {
                    currentIdx--;
                    cards[currentIdx].style.transform = `translateX(${cards[currentIdx].dataset.horizontalPos}%) translateY(0%)`;
                } else {
                    // Bounce back
                    card.style.transform = `translateX(${card.dataset.horizontalPos}%) translateY(0%)`;
                    if (currentIdx > 0) {
                        const prev = cards[currentIdx-1];
                        prev.style.transform = `translateX(${prev.dataset.horizontalPos}%) translateY(-100%)`;
                    }
                }
                setProgress();
            }
            deltaX = 0; deltaY = 0;
        }

        // Support for Mouse Wheel (Vertical only for speed)
        window.addEventListener('wheel', e => {
            if (isDragging) return;
            if (e.deltaY > 50 && currentIdx < cards.length - 1) {
                cards[currentIdx].style.transform = `translateX(${cards[currentIdx].dataset.horizontalPos}%) translateY(-100%)`;
                currentIdx++;
            } else if (e.deltaY < -50 && currentIdx > 0) {
                currentIdx--;
                cards[currentIdx].style.transform = `translateX(${cards[currentIdx].dataset.horizontalPos}%) translateY(0%)`;
            }
            setProgress();
        });

        // Event Bindings
        window.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', e => handleStart(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => handleMove(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', handleEnd);

        setProgress();
    </script>
</body>
</html>
