<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Vocab Cards</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Vertical Container (Scroll Down for New Card) */
        .vertical-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }

        .word-wrapper {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
        }

        /* Horizontal Slider (Swipe Left/Right for Bangla) */
        .horizontal-slider {
            display: flex;
            width: 100vw;
            height: 100%;
            overflow-x: scroll;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }

        .horizontal-slider::-webkit-scrollbar {
            display: none; /* Hide scrollbar Chrome/Safari */
        }

        .card-side {
            min-width: 100vw;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            text-align: center;
        }

        /* Styling for the Content */
        .word {
            font-size: 4rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .language-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            position: absolute;
            bottom: 10%;
        }

        .hint {
            position: absolute;
            bottom: 5%;
            font-size: 0.7rem;
            color: #444;
        }

        /* Black/White alternating or consistent */
        .english-side { background-color: #000; color: #fff; }
        .bangla-side { background-color: #fff; color: #000; }
        .bangla-side .word { color: #000; }
    </style>
</head>
<body>

    <div class="vertical-container" id="main-container">
        <div class="word-wrapper">
            <div class="horizontal-slider">
                <div class="card-side english-side">
                    <div class="word">Resilient</div>
                    <div class="language-label">English</div>
                    <div class="hint">Swipe left for Bangla ⮕</div>
                </div>
                <div class="card-side bangla-side">
                    <div class="word">স্থিতিস্থাপক</div>
                    <div class="language-label">Bengali</div>
                    <div class="hint">⬅ Swipe right for English</div>
                </div>
            </div>
        </div>

        <div class="word-wrapper">
            <div class="horizontal-slider">
                <div class="card-side english-side">
                    <div class="word">Ephemeral</div>
                    <div class="language-label">English</div>
                    <div class="hint">Swipe left for Bangla ⮕</div>
                </div>
                <div class="card-side bangla-side">
                    <div class="word">ক্ষণস্থায়ী</div>
                    <div class="language-label">Bengali</div>
                    <div class="hint">⬅ Swipe right for English</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('main-container');
        
        // Data for infinite scrolling
        const vocabulary = [
            { en: "Serendipity", bn: "আকস্মিক সৌভাগ্য" },
            { en: "Eloquence", bn: "বাগ্মিতা" },
            { en: "Melancholy", bn: "বিষণ্ণতা" },
            { en: "Luminous", bn: "উজ্জ্বল" }
        ];

        let index = 0;

        // Function to create and append a new card
        function createCard(data) {
            const wrapper = document.createElement('div');
            wrapper.className = 'word-wrapper';
            wrapper.innerHTML = `
                <div class="horizontal-slider">
                    <div class="card-side english-side">
                        <div class="word">${data.en}</div>
                        <div class="language-label">English</div>
                        <div class="hint">Swipe left for Bangla ⮕</div>
                    </div>
                    <div class="card-side bangla-side">
                        <div class="word">${data.bn}</div>
                        <div class="language-label">Bengali</div>
                        <div class="hint">⬅ Swipe right for English</div>
                    </div>
                </div>
            `;
            container.appendChild(wrapper);
        }

        // Infinite Scroll Logic
        container.addEventListener('scroll', () => {
            // If user scrolls near the bottom, add a new card
            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 10) {
                createCard(vocabulary[index]);
                index = (index + 1) % vocabulary.length; // Loop through the array
            }
        });
    </script>
</body>
</html>
