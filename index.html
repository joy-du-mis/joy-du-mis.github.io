<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Reels Pro</title>
    <style>
        :root {
            --word-bg: #121212;
            --meaning-bg: #1a237e;
            --accent: #00f2ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Circular Progress Styles */
        #progress-wrapper {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            padding: 5px;
            backdrop-filter: blur(5px);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            stroke: var(--accent);
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .card-stack {
            position: absolute;
            width: 100%;
            height: 100%;
            will-change: transform;
            display: flex;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .page {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            user-select: none;
        }

        .word-page { background: var(--word-bg); }
        .meaning-page { background: var(--meaning-bg); }

        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 10px; }
        .text { font-size: 3rem; font-weight: 900; }

        .hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.3;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="progress-wrapper">
        <svg class="progress-ring" width="40" height="40">
            <circle class="progress-ring__background" stroke="rgba(255,255,255,0.1)" stroke-width="3" fill="transparent" r="16" cx="20" cy="20"/>
            <circle id="progress-circle" class="progress-ring__circle" stroke-width="3" fill="transparent" r="16" cx="20" cy="20"/>
        </svg>
    </div>

    <div id="viewport"></div>
    <div class="hint">Tap: Flip • Swipe: Next/Prev • Scroll: Desktop</div>

    <script>
        const vocab = [
            { en: "Infallible", bn: "নির্ভুল" },
            { en: "Euphoria", bn: "উচ্ছ্বাস" },
            { en: "Serendipity", bn: "আকস্মিক সৌভাগ্য" },
            { en: "Nuance", bn: "সামান্য পার্থক্য" },
            { en: "Vibrant", bn: "প্রাণবন্ত" },
            { en: "Tenacious", bn: "নাছোড়বান্দা" }
        ];

        const viewport = document.getElementById('viewport');
        const circle = document.getElementById('progress-circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;

        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        const cards = [];
        let currentIdx = 0;
        let startY = 0;
        let isDragging = false;
        let deltaY = 0;

        // Initialize Progress
        function setProgress() {
            const percent = ((currentIdx + 1) / vocab.length) * 100;
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
        }

        // 1. Create Cards
        vocab.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'card-stack';
            el.style.zIndex = vocab.length - i;
            el.innerHTML = `
                <div class="page word-page">
                    <div class="label">English</div>
                    <div class="text">${item.en}</div>
                </div>
                <div class="page meaning-page">
                    <div class="label">Bangla</div>
                    <div class="text" style="color:var(--accent)">${item.bn}</div>
                </div>
            `;

            el.addEventListener('click', () => {
                if (Math.abs(deltaY) > 5) return; // Prevent flip while dragging
                const isFlipped = el.dataset.flipped === 'true';
                el.style.transform = isFlipped ? 'translateX(0%)' : 'translateX(-100%)';
                el.dataset.flipped = !isFlipped;
            });

            viewport.appendChild(el);
            cards.push(el);
        });

        // 2. Drag/Scroll Logic
        function handleStart(y) {
            isDragging = true;
            startY = y;
            cards.forEach(c => c.style.transition = 'none');
        }

        function handleMove(y) {
            if (!isDragging) return;
            deltaY = y - startY;

            // Move current card up
            if (deltaY < 0 && currentIdx < cards.length - 1) {
                cards[currentIdx].style.transform = `translateY(${deltaY}px)`;
            } 
            // Pull previous card down
            else if (deltaY > 0 && currentIdx > 0) {
                const prevCard = cards[currentIdx - 1];
                prevCard.style.transform = `translateY(${-window.innerHeight + deltaY}px)`;
            }
        }

        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            const threshold = window.innerHeight * 0.2;

            cards.forEach(c => c.style.transition = 'transform 0.5s cubic-bezier(0.2, 1, 0.3, 1)');

            if (deltaY < -threshold && currentIdx < cards.length - 1) {
                cards[currentIdx].style.transform = `translateY(-100%)`;
                currentIdx++;
            } else if (deltaY > threshold && currentIdx > 0) {
                currentIdx--;
                cards[currentIdx].style.transform = `translateY(0%)`;
            } else {
                // Bounce back
                cards[currentIdx].style.transform = cards[currentIdx].dataset.flipped === 'true' ? 'translateX(-100%)' : 'translateX(0%)';
                if (currentIdx > 0) cards[currentIdx-1].style.transform = `translateY(-100%)`;
            }
            setProgress();
            deltaY = 0;
        }

        // Desktop Wheel
        window.addEventListener('wheel', e => {
            if (isDragging) return;
            if (e.deltaY > 50 && currentIdx < cards.length - 1) {
                cards[currentIdx].style.transform = `translateY(-100%)`;
                currentIdx++;
            } else if (e.deltaY < -50 && currentIdx > 0) {
                currentIdx--;
                cards[currentIdx].style.transform = `translateY(0%)`;
            }
            setProgress();
        });

        // Event Listeners
        window.addEventListener('mousedown', e => handleStart(e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientY));
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', e => handleStart(e.touches[0].clientY));
        window.addEventListener('touchmove', e => handleMove(e.touches[0].clientY));
        window.addEventListener('touchend', handleEnd);

        setProgress();
    </script>
</body>
</html>
