<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Reels - Pro</title>
    <style>
        :root {
            --word-bg: #121212;
            --meaning-bg: #1a237e; /* Deep Indigo for meaning */
            --accent: #00f2ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            overflow: hidden; /* Fixes mouse scroll issues */
            touch-action: none;
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #card-container {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            will-change: transform;
        }

        .page {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            user-select: none;
        }

        .word-page { background: var(--word-bg); }
        .meaning-page { background: var(--meaning-bg); }

        .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.4);
        }

        .text {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="card-container">
            <div class="page word-page">
                <div class="label">English</div>
                <div id="en-text" class="text">Scroll or Swipe</div>
            </div>
            <div class="page meaning-page">
                <div class="label">Bangla</div>
                <div id="bn-text" class="text" style="color: var(--accent);">শুরু করুন</div>
            </div>
        </div>
    </div>

    <div class="footer">Click to toggle Meaning • Scroll/Swipe up for Next</div>

    <script>
        const vocab = [
            { en: "Meticulous", bn: "অতি সতর্ক" },
            { en: "Aesthetic", bn: "নান্দনিক" },
            { en: "Capricious", bn: "খেয়ালী" },
            { en: "Diligent", bn: "পরিশ্রমী" },
            { en: "Enigma", bn: "ধাঁধা" }
        ];

        let idx = 0;
        let isMeaningShown = false;
        let isAnimating = false;
        let startY = 0;

        const container = document.getElementById('card-container');
        const enText = document.getElementById('en-text');
        const bnText = document.getElementById('bn-text');

        function updateContent() {
            enText.textContent = vocab[idx].en;
            bnText.textContent = vocab[idx].bn;
        }

        // 1. CLICK: Toggle between Word and Meaning
        window.addEventListener('click', () => {
            if (isAnimating) return;
            isMeaningShown = !isMeaningShown;
            container.style.transform = isMeaningShown ? 'translateX(-100%)' : 'translateX(0%)';
        });

        // 2. MOUSE WHEEL: Vertical navigation
        window.addEventListener('wheel', (e) => {
            if (isAnimating) return;

            if (e.deltaY > 50) { // Scroll Down -> Next Word
                if (idx < vocab.length - 1) animateNext(1);
            } else if (e.deltaY < -50) { // Scroll Up -> Prev Word
                if (idx > 0) animateNext(-1);
            }
        });

        // 3. TOUCH: Swipe Logic
        window.addEventListener('touchstart', e => startY = e.touches[0].clientY);
        window.addEventListener('touchend', e => {
            const diff = startY - e.changedTouches[0].clientY;
            if (Math.abs(diff) > 60 && !isAnimating) {
                if (diff > 0 && idx < vocab.length - 1) animateNext(1);
                else if (diff < 0 && idx > 0) animateNext(-1);
            }
        });

        function animateNext(step) {
            isAnimating = true;
            
            // Fade out and slide current word
            container.style.transition = 'transform 0.4s ease-in, opacity 0.3s';
            const vDir = step > 0 ? -50 : 50; 
            container.style.opacity = "0";
            container.style.transform += ` translateY(${vDir}px)`;

            setTimeout(() => {
                idx += step;
                updateContent();
                isMeaningShown = false;
                
                // Reset position to prepare for slide-in
                container.style.transition = 'none';
                container.style.transform = `translateX(0%) translateY(${-vDir}px)`;
                
                requestAnimationFrame(() => {
                    container.style.transition = 'transform 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28), opacity 0.4s';
                    container.style.transform = `translateX(0%) translateY(0%)`;
                    container.style.opacity = "1";
                    
                    setTimeout(() => { isAnimating = false; }, 500);
                });
            }, 350);
        }

        updateContent();
    </script>
</body>
</html>
